name: Build EV Diagnostic APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Setup Gradle 8.4 โดยตรง (ไม่ใช้ gradlew wrapper)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      # 4. Cache Gradle
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # 5. Build Debug APK
      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      # 6. Upload APK (ดาวน์โหลดได้จาก GitHub Actions tab)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EV-Diagnostic-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
